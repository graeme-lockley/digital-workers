name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-repo:
    name: Validate Repository Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Run all repository validators
        run: pnpm validate:kanban:all